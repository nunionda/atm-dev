# ===== ATS 전략 설정 파일 =====
# 문서 참조: ATS-BRD-001 v1.0, Section 2.5
# 변경 시 장중(09:00~15:30) 외 시간에 수정할 것

system:
  name: "ATS-MomentumSwing"
  version: "1.0.0"
  log_level: "INFO"           # DEBUG | INFO | WARNING | ERROR

schedule:
  pre_market_start: "08:50"   # 시스템 기동
  market_open: "09:00"        # 장 시작
  buy_start: "09:30"          # 매수 시작 (장초반 관망 후)
  buy_end: "15:00"            # 신규 매수 중단
  market_close: "15:30"       # 장 마감
  report_time: "15:35"        # 일일 리포트 생성
  scan_interval_sec: 60       # 스캔 주기 (초)

universe:
  type: "KOSPI200"
  exclude: []                 # 매매 제외 종목 코드 리스트

strategy:
  name: "MomentumSwing"

  # 이동평균선 (BRD §2.3.1 PS1)
  ma_short: 5                 # 단기 이평선 (일)
  ma_long: 20                 # 장기 이평선 (일)

  # MACD (BRD §2.3.1 PS2)
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9

  # RSI (BRD §2.3.2 CF1)
  rsi_period: 14
  rsi_lower: 52               # CF1 하한 (CLAUDE.md Phase 3)
  rsi_upper: 78               # CF1 상한 (CLAUDE.md Phase 3)

  # 볼린저밴드 (BRD §2.3.3 RG4)
  bb_period: 20
  bb_std: 2                   # 표준편차 배수

  # 거래량 (BRD §2.3.2 CF2)
  volume_ma_period: 20        # 거래량 이평 기간
  volume_multiplier: 1.5      # 평균 대비 배수

exit:
  stop_loss_pct: -0.05        # ES1 손절 -5% (CLAUDE.md Phase 5)
  take_profit_pct: 0.20       # 익절 +20% (BULL 기준, 체제별 동적)
  trailing_stop_pct: -0.04    # 트레일링 스탑 기본 floor -4% (Progressive ATR)
  max_holding_days: 40        # 최대 보유일 BULL (체제별: 40/25/15)

portfolio:
  max_positions: 60           # 최대 보유 종목수 — 전체 tactical
  max_weight_per_stock: 0.05  # 종목당 최대 비중 5% (60종목 균등 기준)
  min_cash_ratio: 0.70        # Kelly 30% 투자 → 현금 70% 보유

# ── Tactical 전용 포트폴리오 배분 (Kelly Criterion 기반) ──
portfolio_allocation:
  enabled: true
  kelly_fraction: 0.30        # Kelly 기준 투자 비율 (전체 자본의 30%)

  tactical:                   # 전체 투자금을 tactical 모멘텀 알파에 배분
    top_n: 60                 # 리밸런싱 상위 종목 수 (60종목 전체)
    weight: 1.00              # 투자금의 100%
    rebalance_days: 14        # 리밸런싱 주기 (일)

risk:
  daily_loss_limit: -0.05     # 일일 손실 한도 -5% (BR-R01)
  mdd_limit: -0.15            # MDD 한도 -15% (BR-R02)
  max_order_amount: 3000000   # 1회 최대 주문금액 (BR-R04)

order:
  default_buy_type: "LIMIT"   # 매수 주문 유형 (LIMIT | MARKET)
  buy_timeout_min: 30         # 매수 미체결 취소 시간 (BR-B06)
  sell_timeout_min: 15        # 매도 미체결 → 시장가 전환 (BR-S05)
  max_retry: 3                # 주문 재시도 횟수 (BR-O05)
  retry_interval_sec: 5       # 재시도 간격 (초)

# ── SMC 4-Layer 스코어링 전략 ──
smc_strategy:
  swing_length: 3             # Swing Point 프랙탈 길이
  entry_threshold: 60         # 최소 진입 점수 (0~100)
  atr_sl_mult: 2.0            # ATR × 배수 = Stop Loss
  atr_tp_mult: 3.0            # ATR × 배수 = Take Profit
  choch_exit: true            # CHoCH 발생 시 청산 여부
  ob_lookback: 20             # Order Block 탐색 범위 (캔들 수)
  fvg_mitigation: true        # FVG 미티게이션 추적 여부
  weight_smc: 40              # Layer 1: SMC Bias
  weight_bb: 20               # Layer 2: BB Squeeze + ATR
  weight_obv: 20              # Layer 3a: OBV
  weight_momentum: 20         # Layer 3b: ADX + MACD

# ── Breakout-Retest 전략 (돌파 후 리테스트 진입) ──
breakout_retest:
  # Phase A: Breakout Detection
  swing_length: 3             # Swing Point 프랙탈 길이
  bb_squeeze_lookback: 100    # BB Width 최저점 탐색 범위
  bb_squeeze_ema: 50          # BB Width EMA 스무딩
  displacement_atr_mult: 1.5  # Displacement 캔들 (body > ATR × mult)
  obv_break_lookback: 20      # OBV 돌파 lookback
  adx_threshold: 25           # ADX 최소 강도
  adx_rising_bars: 3          # ADX 연속 상승 봉 수

  # Fakeout Filters
  min_volume_ratio: 1.0       # Err01: volume < MA20 × ratio → 차단
  max_wick_body_ratio: 1.0    # Err02: wick / body > ratio → 차단
  divergence_check: true      # Err03: MACD/RSI 다이버전스 차단

  # Scoring Weights (합계 100)
  weight_structure: 30        # Layer 1: SMC 구조
  weight_volatility: 20       # Layer 2: BB/ATR
  weight_volume: 25           # Layer 3: OBV
  weight_momentum: 25         # Layer 4: ADX/MACD
  breakout_threshold: 65      # 돌파 확인 최소 점수

  # Phase B: Retest Entry
  retest_max_bars: 15         # 리테스트 대기 최대 봉 수
  retest_zone_atr_buffer: 0.3 # 존 하단 ATR 버퍼
  retest_volume_decay: 0.8    # 풀백 거래량 < MA20 × decay
  retest_rsi_floor: 40        # RSI 하한
  retest_rejection_wick_ratio: 0.5  # 반등 캔들 하단꼬리/몸통

  # Retest Zone Scoring
  use_fvg_zone: true
  use_ob_zone: true
  use_breakout_level: true
  fvg_zone_weight: 40
  ob_zone_weight: 35
  level_zone_weight: 25
  retest_zone_threshold: 50

  # Exit Rules
  atr_sl_mult: 1.5            # 타이트 SL (리테스트 진입)
  atr_tp_mult: 3.0            # R:R 2:1
  choch_exit: true
  max_holding_days: 30
  trailing_activation_pct: 0.05
  trailing_atr_mult: 2.0

# ── Mean Reversion 전략 (과매도 구간 평균 회귀 진입) ──
mean_reversion:
  rsi_oversold: 35              # RSI oversold zone (graduated: <25=strong, <35=moderate, <42=mild)
  rsi_overbought: 70            # RSI for mean-reversion TP
  entry_threshold: 50           # 최소 진입 점수 (graduated scoring으로 하향)
  adx_trending_limit: 30        # ADX > 이 값 = 강한 추세장 (MR 비선호, 25→30 완화)
  extreme_oversold_rsi: 30      # 극도 과매도 시 ADX 필터 무시 (25→30 완화)
  atr_sl_mult: 1.5              # ATR × mult for SL
  volume_spike_mult: 1.5        # 거래량 > MA20 × mult (2.0→1.5 완화)
  consecutive_down_days: 2      # 최소 연속 하락일 (3→2 완화)
  max_holding_days: 15          # 최대 보유일 (단기 전략)
  max_weight_pct: 0.10          # 종목당 최대 비중 10%
  stochastic_k_period: 14       # Stochastic %K
  stochastic_d_period: 3        # Stochastic %D
  # Layer weights (sum = 100)
  weight_signal: 40             # Layer 1: MR signal
  weight_volatility: 30         # Layer 2: Vol & volume
  weight_confirmation: 30       # Layer 3: Confirmation

# ── Statistical Pairs Arbitrage 전략 (Long+Short 양방향) ──
arbitrage:
  correlation_lookback: 60        # 상관관계 계산 기간 (일)
  correlation_min: 0.50           # v4: 0.60→0.50 상관관계 필터 완화 (KOSPI 진입 확대)
  zscore_lookback: 20             # Z-Score 계산 기간 (일)
  zscore_entry: 1.5               # v4: 2.0→1.5 진입 Z-Score 완화 (진입 기회 확대)
  zscore_exit: 0.2                # v2: 0.5→0.2 방향성 Z 청산 (BUG-5)
  halflife_max: 40                # v2: 20→40 최대 반감기 (BUG-7)
  entry_threshold: 60             # v4: 70→60 복원 (진입 기회 확대)
  atr_sl_mult: 2.0                # ATR × 배수 = Stop Loss (ADX < 20)
  atr_sl_mult_strong: 1.5         # ATR × 배수 (ADX ≥ 20, 강한 추세)
  adx_dynamic_threshold: 20       # Dynamic ATR 전환 ADX 기준
  max_holding_days: 20            # 최대 보유일
  max_pairs: 7                    # v4: 5→7 동시 보유 최대 페어 수 확대
  max_weight_per_pair: 0.07       # v3: 0.10→0.07 페어당 최대 비중 7%
  trailing_activation_pct: 0.05   # 트레일링 활성화 5%
  correlation_decay_exit: 0.35    # v2: 0.20→0.35 상관관계 35% 하락 시 청산 (BUG-4)
  corr_decay_confirm_days: 2      # v2 신규: 상관관계 붕괴 2일 연속 확인 (BUG-4)
  pair_cooldown_days: 5           # v4: 10→5 쿨다운 축소 (재진입 기회 확대)
  cross_sector_pairs: true        # v2 신규: 크로스섹터 페어 허용 (BUG-7)
  arb_mdd_limit: 0.10             # v3 신규: 차익거래 MDD 한도 -10% (서킷브레이커)
  arb_mdd_recovery: 0.05          # v4 신규: DD -5% 회복 시 거래 재개
  arb_mdd_halt_max_days: 20       # v4 신규: MDD 차단 최대 일수 (초과 시 자동 복구)
  min_hold_days_for_tp: 3         # v3 신규: Z-Score TP 최소 보유일 3일
  warmup_buffer_days: 5           # v3 신규: 첫 5거래일 진입 금지
  pair_rediscovery_days: 3        # v4 신규: 페어 재발견 주기 (5→3일)
  weight_correlation: 40          # Layer 1: 상관관계 품질
  weight_spread: 35               # Layer 2: 스프레드 이탈도
  weight_volume: 25               # Layer 3: 거래량 + EV 확인

  # v5: Fixed ETF Pair Mode + Basis Gate
  use_fixed_pairs: true            # 고정 ETF 페어 모드 (동적 발견 대체)
  basis_gate_enabled: true         # 콘탱고/백워데이션 게이트 활성화
  etf_entry_threshold: 50          # ETF 페어용 진입 임계값 (동일지수 ETF는 스코어 낮아도 OK)

  basis_signals:
    - market: sp500
      spot_ticker: "SPY"
      futures_ticker: "ES=F"
      spot_code: "SPY"
      futures_code: "ES=F"
      basis_ma_period: 20
      basis_zscore_threshold: 1.5
    - market: ndx
      spot_ticker: "SPY"
      futures_ticker: "ES=F"
      spot_code: "SPY"
      futures_code: "ES=F"
      basis_ma_period: 20
      basis_zscore_threshold: 1.5
    - market: kospi
      spot_ticker: "^KS200"
      futures_ticker: ""
      spot_code: "^KS200"
      futures_code: ""
      basis_ma_period: 20
      basis_zscore_threshold: 1.5
      use_premium_estimate: true

  fixed_pairs:
    # US: S&P 500 동일지수 ETF 페어
    - market: sp500
      code_a: "SPY"
      ticker_a: "SPY"
      name_a: "SPDR S&P 500"
      code_b: "IVV"
      ticker_b: "IVV"
      name_b: "iShares S&P 500"
      sector: "SP500_ETF"
    - market: sp500
      code_a: "SPY"
      ticker_a: "SPY"
      name_a: "SPDR S&P 500"
      code_b: "VOO"
      ticker_b: "VOO"
      name_b: "Vanguard S&P 500"
      sector: "SP500_ETF"
    # US: 반도체 테마 ETF 페어
    - market: sp500
      code_a: "SMH"
      ticker_a: "SMH"
      name_a: "VanEck Semiconductor"
      code_b: "SOXX"
      ticker_b: "SOXX"
      name_b: "iShares Semiconductor"
      sector: "SEMI_ETF"
    # US: NASDAQ 동일지수 ETF 페어
    - market: ndx
      code_a: "QQQ"
      ticker_a: "QQQ"
      name_a: "Invesco QQQ"
      code_b: "QQQM"
      ticker_b: "QQQM"
      name_b: "Invesco Nasdaq 100 Mini"
      sector: "NDX_ETF"
    # Korea: KOSPI200 동일지수 ETF 페어
    - market: kospi
      code_a: "069500"
      ticker_a: "069500.KS"
      name_a: "KODEX 200"
      code_b: "102110"
      ticker_b: "102110.KS"
      name_b: "TIGER 200"
      sector: "KS200_ETF"

# ── S&P 500 선물지수 매매 전략 (E-mini ES / Micro MES) ──
sp500_futures:
  # 기본 설정
  ticker: "ES=F"                     # E-mini S&P 500 선물 티커
  contract_multiplier: 50.0          # E-mini: $50/pt, Micro: $5/pt
  is_micro: false                    # Micro E-mini 여부

  # Z-Score 통계적 위치 분석
  zscore_ma_period: 20               # Z-Score MA 기간
  zscore_std_period: 20              # Z-Score 표준편차 기간
  zscore_long_threshold: -2.0        # 롱 진입 Z-Score (과매도)
  zscore_short_threshold: 2.0        # 숏 진입 Z-Score (과매수)

  # 추세 필터 (EMA 정렬)
  ma_fast: 10                        # 단기 EMA
  ma_mid: 20                         # 중기 EMA
  ma_slow: 50                        # 장기 EMA
  ma_trend: 200                      # 장기 추세 MA
  adx_period: 14                     # ADX 기간
  adx_threshold: 25.0                # 최소 추세 강도
  adx_strong: 40.0                   # 강한 추세 ADX

  # MACD
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9

  # RSI
  rsi_period: 14
  rsi_oversold: 30.0                 # 과매도
  rsi_overbought: 70.0               # 과매수
  rsi_long_range: [40.0, 70.0]       # 롱 진입 RSI 범위
  rsi_short_range: [30.0, 60.0]      # 숏 진입 RSI 범위

  # 볼린저밴드
  bb_period: 20
  bb_std: 2.0
  bb_squeeze_ratio: 0.8              # 스퀴즈 판단 비율

  # ATR
  atr_period: 14
  atr_breakout_mult: 0.15            # 돌파 필터: 일일봉 최적화 (기존 0.75)
  atr_trend_mult: 1.5                # 추세 진입: Close > PrevClose ± mult×ATR

  # 거래량
  volume_ma_period: 20
  volume_confirm_mult: 1.5           # 거래량 확인 배수

  # OBV
  obv_ema_fast: 5
  obv_ema_slow: 20

  # 진입 임계값
  entry_threshold: 50.0              # 4-Layer 합산 최소 점수 (일일봉 최적화, 기존 60)

  # 손절 설정 (ATR 기반 동적)
  sl_atr_mult: 2.0                   # ADX < 25 → 2.0×ATR
  sl_atr_mult_strong: 1.5            # ADX ≥ 25 → 1.5×ATR (타이트)
  sl_hard_pct: 0.05                  # 하드 손절 5% (선물 특화)

  # 익절 설정
  tp_atr_mult: 3.0                   # ATR ×3 익절
  tp_rr_ratio: 2.0                   # 최소 R:R 비율

  # 트레일링 스탑
  trailing_activation_pct: 0.02      # +2%에서 트레일링 활성화
  trailing_atr_mult: 2.0             # 트레일링 ATR 배수
  chandelier_atr_mult: 3.0           # 샹들리에 ATR 배수

  # 최대 보유 기간
  max_holding_days: 20

  # 포지션 사이징 (Kelly Criterion)
  kelly_fraction: 0.3                # Half-Kelly 선물용
  max_contracts: 10                  # 최대 계약 수
  risk_per_trade_pct: 0.015          # 트레이드당 리스크 1.5%

  # 4-Layer 가중치 (합계 100)
  weight_zscore: 25.0                # L1: Z-Score 통계적 위치
  weight_trend: 25.0                 # L2: 추세/구조
  weight_momentum: 25.0              # L3: 모멘텀 (MACD, ADX, RSI)
  weight_volume: 25.0                # L4: 거래량/OBV

  # CHoCH 퇴출 확인
  choch_confirm_bars: 2              # MACD 반전 확인 봉수
  choch_pnl_gate_loss: -0.02         # CHoCH 손실 게이트 (-2%)
  choch_pnl_gate_profit: 0.04        # CHoCH 이익 게이트 (+4%)

  # 페이크아웃 필터
  fakeout_min_vol_ratio: 0.5         # 최소 거래량 비율 (일일봉 최적화, 기존 0.8)
  fakeout_max_wick_ratio: 2.0        # 최대 윅/바디 비율 (일일봉 최적화, 기존 1.5)

  # Z-Score 추세추종 보간 파라미터
  zscore_trend_cont_max_pct: 0.3     # 추세 중 풀백 시 최대 점수 비율
  zscore_trend_cont_min_pct: 0.1     # 추세 중 확장 시 최소 점수 비율

  # 레짐별 진입 임계값
  regime_bull_entry_threshold: 50.0  # BULL 시 진입 임계값 (일일봉 최적화)

  # 서킷브레이커 (시스템 레벨)
  rg1_daily_loss_limit: -0.03        # 일일 손실 한도 (-3%)
  rg2_mdd_limit: -0.10              # MDD 한도 (-10%)

  # 거래소 서킷브레이커 (CME)
  cb_level1_pct: 0.07               # -7% → 거래 중단
  cb_level2_pct: 0.13               # -13% → 거래 중단
  cb_level3_pct: 0.20               # -20% → 당일 종결
  cb_overnight_limit: 0.07          # 야간 ±7%
  exchange_cb_enabled: true

  # 증거금
  es_initial_margin: 15500.0        # ES 개시증거금 ($)
  es_maintenance_margin: 13700.0    # ES 유지증거금 ($)
  mes_initial_margin: 1550.0        # MES 개시증거금 ($)
  mes_maintenance_margin: 1370.0    # MES 유지증거금 ($)
  margin_call_enabled: true         # 증거금 시뮬레이션 토글

  # 롤오버
  roll_cost_per_contract: 12.50     # 캘린더 스프레드 비용 추정 ($)
  roll_warning_days: 5              # 롤 접근 경고 일수

  # 거래비용 (백테스트용)
  futures_slippage_per_contract: 12.50   # 슬리피지/계약 ($, 1틱 ES)
  futures_commission_per_contract: 4.62  # 라운드턴 커미션/계약 ($)
  # 비용 세분화
  es_exchange_fee: 1.40             # ES 거래소 수수료 ($)
  es_broker_fee: 0.85               # ES 브로커 수수료 ($)
  es_nfa_fee: 0.02                  # ES NFA 수수료 ($)
  mes_exchange_fee: 0.35            # MES 거래소 수수료 ($)
  mes_broker_fee: 0.25              # MES 브로커 수수료 ($)
  mes_nfa_fee: 0.02                 # MES NFA 수수료 ($)

# ── ES-F 인트라데이 데이트레이딩 전략 ──
esf_intraday:
  # 계약
  ticker: "ES=F"
  contract_multiplier: 50.0
  is_micro: true                      # 기본 MES ($5/pt)

  # 타임프레임
  primary_interval: "15m"             # 실행 타임프레임
  bias_interval: "1h"                 # 바이어스 타임프레임
  rth_start: "09:30"                  # RTH 시작 (ET)
  rth_end: "16:00"                    # RTH 종료 (ET)
  eod_close_minutes_before: 15        # EOD 강제 청산 (종료 N분 전)

  # 지표 기간 (15m 바 기준)
  ema_fast: 8
  ema_mid: 21
  ema_slow: 55
  rsi_period: 14
  atr_period: 20
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  zscore_window: 40                   # ~10시간 RTH
  bb_period: 20
  bb_std: 2.0
  adx_period: 14
  adx_threshold: 25.0
  volume_ma_period: 20

  # Volume Profile
  vp_session_bars: 26                 # ~6.5hr RTH / 15m
  vp_lookback_sessions: 3
  vp_value_area_pct: 0.70

  # 4-Layer 스코어링 가중치 (합계=100)
  weight_amt_location: 30.0           # L1: AMT + Location
  weight_zscore: 20.0                 # L2: Z-Score
  weight_momentum: 25.0               # L3: Momentum
  weight_volume_aggression: 25.0      # L4: Volume + Aggression

  # Grade 임계값
  grade_a_threshold: 55.0
  grade_b_threshold: 45.0
  grade_c_threshold: 35.0

  # AMT 파라미터
  amt_balance_ratio: 0.70
  amt_aggression_body_ratio: 0.65
  amt_aggression_vol_mult: 1.5
  amt_consecutive_bars: 3

  # 청산
  sl_hard_pct: 0.015                  # -1.5% 하드 손절
  sl_atr_mult: 1.2                    # OPT-A3: 1.5→1.2 (Sharpe 2.29)
  tp_atr_mult: 2.0                    # OPT-A3: 2.5→2.0, R:R 1.67:1
  trailing_activation_pct: 0.008      # +0.8% 활성화
  trailing_atr_mult: 1.0

  # 리스크 관리
  max_daily_trades: 5
  max_daily_loss_dollars: 500.0       # MES 기준
  max_consecutive_losses: 3
  risk_per_trade_pct: 0.01
  max_contracts: 5
  kelly_fraction: 0.3

  # 거래 비용 (MES)
  slippage_ticks: 1
  commission_per_contract: 0.62

  # 증거금 (MES)
  initial_margin: 1550.0
  maintenance_margin: 1370.0

  # RSI 범위
  rsi_long_range_min: 40.0
  rsi_long_range_max: 70.0
  rsi_short_range_min: 30.0
  rsi_short_range_max: 60.0

benchmark_tuning:
  spy_ma200_gate: true          # P4 RG6: block long strategies when index < MA200
  spy_ma200_period: 200         # MA period for SPY gate
  qqq_rsi_threshold: 45         # QQQ RSI threshold for bearish filter

signal_fusion:
  enabled: true
  adaptive_threshold: true
  vix_threshold_bonus_per_point: 0.5   # +0.5 threshold per VIX point above 20
  dd_threshold_bonus: 50               # +N per 1.0 dd_pct (so -10% → +5)
  max_threshold_adjustment: 20         # Cap
  conflict_resolution: true
  conflict_reduction: 0.70             # Reduce score by 30% on conflict
