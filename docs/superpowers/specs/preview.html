<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unified Portfolio Engine — Design Spec</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  body { max-width: 900px; margin: 0 auto; padding: 40px 20px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; line-height: 1.6; }
  h1 { color: #58a6ff; border-bottom: 1px solid #30363d; padding-bottom: 12px; }
  h2 { color: #58a6ff; border-bottom: 1px solid #21262d; padding-bottom: 8px; margin-top: 40px; }
  h3 { color: #79c0ff; margin-top: 28px; }
  strong { color: #e6edf3; }
  code { background: #161b22; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #79c0ff; }
  pre { background: #161b22; padding: 16px; border-radius: 8px; overflow-x: auto; border: 1px solid #30363d; }
  pre code { background: none; padding: 0; color: #c9d1d9; }
  table { border-collapse: collapse; width: 100%; margin: 16px 0; }
  th, td { border: 1px solid #30363d; padding: 8px 12px; text-align: left; }
  th { background: #161b22; color: #58a6ff; }
  tr:nth-child(even) { background: #0d1117; }
  tr:nth-child(odd) { background: #161b22; }
  hr { border: none; border-top: 1px solid #30363d; margin: 32px 0; }
  a { color: #58a6ff; }
  blockquote { border-left: 4px solid #58a6ff; margin: 16px 0; padding: 8px 16px; background: #161b22; }
  .status-badge { display: inline-block; background: #1f6feb; color: white; padding: 4px 12px; border-radius: 16px; font-size: 0.85em; margin-left: 8px; }
</style>
</head>
<body>
<div id="content"></div>
<script>
fetch('./2026-03-15-unified-portfolio-engine-design.md')
  .then(r => r.text())
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
  })
  .catch(() => {
    document.getElementById('content').innerHTML = '<p>Loading markdown file... Please ensure the file exists.</p>';
  });
</script>
</body>
</html>
