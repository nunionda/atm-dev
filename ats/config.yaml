# ===== ATS 전략 설정 파일 =====
# 문서 참조: ATS-BRD-001 v1.0, Section 2.5
# 변경 시 장중(09:00~15:30) 외 시간에 수정할 것

system:
  name: "ATS-MomentumSwing"
  version: "1.0.0"
  log_level: "INFO"           # DEBUG | INFO | WARNING | ERROR

schedule:
  pre_market_start: "08:50"   # 시스템 기동
  market_open: "09:00"        # 장 시작
  buy_start: "09:30"          # 매수 시작 (장초반 관망 후)
  buy_end: "15:00"            # 신규 매수 중단
  market_close: "15:30"       # 장 마감
  report_time: "15:35"        # 일일 리포트 생성
  scan_interval_sec: 60       # 스캔 주기 (초)

universe:
  type: "KOSPI200"
  exclude: []                 # 매매 제외 종목 코드 리스트

strategy:
  name: "MomentumSwing"

  # 이동평균선 (BRD §2.3.1 PS1)
  ma_short: 5                 # 단기 이평선 (일)
  ma_long: 20                 # 장기 이평선 (일)

  # MACD (BRD §2.3.1 PS2)
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9

  # RSI (BRD §2.3.2 CF1)
  rsi_period: 14
  rsi_lower: 30               # 과매도 기준
  rsi_upper: 70               # 과매수 기준

  # 볼린저밴드 (BRD §2.3.3 RG4)
  bb_period: 20
  bb_std: 2                   # 표준편차 배수

  # 거래량 (BRD §2.3.2 CF2)
  volume_ma_period: 20        # 거래량 이평 기간
  volume_multiplier: 1.5      # 평균 대비 배수

exit:
  stop_loss_pct: -0.03        # 손절 -3% (BR-S01 불변)
  take_profit_pct: 0.07       # 익절 +7%
  trailing_stop_pct: -0.03    # 트레일링 스탑 -3%
  max_holding_days: 10        # 최대 보유일

portfolio:
  max_positions: 60           # 최대 보유 종목수 — 전체 tactical
  max_weight_per_stock: 0.05  # 종목당 최대 비중 5% (60종목 균등 기준)
  min_cash_ratio: 0.70        # Kelly 30% 투자 → 현금 70% 보유

# ── Tactical 전용 포트폴리오 배분 (Kelly Criterion 기반) ──
portfolio_allocation:
  enabled: true
  kelly_fraction: 0.30        # Kelly 기준 투자 비율 (전체 자본의 30%)

  tactical:                   # 전체 투자금을 tactical 모멘텀 알파에 배분
    top_n: 60                 # 리밸런싱 상위 종목 수 (60종목 전체)
    weight: 1.00              # 투자금의 100%
    rebalance_days: 14        # 리밸런싱 주기 (일)

risk:
  daily_loss_limit: -0.03     # 일일 손실 한도 -3% (BR-R01)
  mdd_limit: -0.10            # MDD 한도 -10% (BR-R02)
  max_order_amount: 3000000   # 1회 최대 주문금액 (BR-R04)

order:
  default_buy_type: "LIMIT"   # 매수 주문 유형 (LIMIT | MARKET)
  buy_timeout_min: 30         # 매수 미체결 취소 시간 (BR-B06)
  sell_timeout_min: 15        # 매도 미체결 → 시장가 전환 (BR-S05)
  max_retry: 3                # 주문 재시도 횟수 (BR-O05)
  retry_interval_sec: 5       # 재시도 간격 (초)

# ===== SMC (Smart Money Concepts) 4-Layer 전략 설정 =====
# smcTheory.md 기반 알고리즘 파라미터
smc_strategy:
  swing_length: 3             # Swing Point 프랙탈 길이 (좌우 N캔들)
  entry_threshold: 60         # 최소 진입 점수 (4-Layer 합산, 0~100)
  atr_sl_mult: 2.0            # ATR × 배수 = Stop Loss 거리
  atr_tp_mult: 3.0            # ATR × 배수 = Take Profit 거리
  choch_exit: true             # CHoCH 발생 시 청산 여부
  ob_lookback: 20             # Order Block 탐색 범위 (캔들 수)
  fvg_mitigation: true         # FVG 미티게이션 추적 여부
  # Layer 가중치 (합계 100)
  weight_smc: 40              # Layer 1: Context & Bias (BOS/CHoCH/OB/FVG)
  weight_bb: 20               # Layer 2: Setup & Volatility (BB Squeeze + ATR)
  weight_obv: 20              # Layer 3a: Signal (OBV 거래량 확인)
  weight_momentum: 20         # Layer 3b: Signal (ADX + MACD 모멘텀)
